<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120" width="280" height="120">
  <!-- Yellow EST I Logo -->
  <defs>
    <linearGradient id="estGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEB3B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBC02D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Yellow background circle -->
  <circle cx="140" cy="60" r="55" fill="url(#estGradient)" opacity="0.15"/>
  
  <!-- EST Text -->
  <text x="140" y="75" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="900" text-anchor="middle" fill="#FFEB3B" letter-spacing="2">EST</text>
  
  <!-- Roman Numeral I -->
  <text x="232" y="48" font-family="Garamond, serif" font-size="32" font-weight="bold" text-anchor="start" fill="#1a202c">I</text>
  
  <!-- Optional subtitle -->
  <text x="140" y="105" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#718096">EXAM ASSIGNMENT</text>
</svg>
